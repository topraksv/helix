version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Istanbul
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      safe-npm-updates:
        update-types: [minor, patch]
    # Expo SDK owns the compatible React/React Native/native-library matrix.
    # Dependabot treats React Native's pre-1.0 minor jumps as ordinary minors,
    # and can also propose unsupported patch lines. Ignore routine version
    # updates at every SemVer level; Dependabot security updates remain
    # eligible. Remove these guards only in the coordinated SDK/toolchain
    # upgrade tracked by BACKLOG-SDK-01.
    ignore:
      - dependency-name: "expo*"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "babel-preset-expo"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-web"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-safe-area-context"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-screens"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-svg"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "eslint-config-expo"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/Istanbul
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
