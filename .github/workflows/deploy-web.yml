# Builds the Expo web app as a static export and publishes it to GitHub Pages
# on every push to main. Served at https://topraksv.github.io/helix/.
#
# The EXPO_PUBLIC_* values below are client-side keys: they ship inside the JS
# bundle by design (same values as .env), so they are safe to keep in this file.
# The service role key is NOT used here — it lives only in Actions secrets
# for the keepalive workflow.
name: deploy-web

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # This exact job name is the required branch-protection check. Keep all
  # release-blocking validation here so Pages can never deploy an unchecked
  # commit from main.
  quality:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: https://nwenaeyimbqxyhhsfrsi.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_NvhpZdHfjtL1zRBLQp60gQ_FS90zaj3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Expo SDK 54 tooling is incompatible with Node 24/26 native TypeScript
      # stripping (it chokes on expo-modules-core's src/index.ts). Node 22 is
      # the newest LTS the SDK 54 build supports.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npx expo lint
      - run: npx expo export -p web
      # GitHub Pages serves 404.html for unknown paths (e.g. deep links to
      # dynamic routes like /cash-flow/2026-05); the not-found page loads the
      # router bundle, which then renders the real route client-side.
      - if: github.event_name != 'pull_request'
        run: cp dist/+not-found.html dist/404.html
      - if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
